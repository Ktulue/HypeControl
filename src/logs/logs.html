<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hype Control Logs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #18181b;
      color: #efeff1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      font-size: 13px;
      padding: 16px;
    }

    h1 {
      font-size: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }

    .tab-btn {
      background: #1f1f23;
      color: #adadb8;
      border: 1px solid #3d3d42;
      border-radius: 4px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #9147ff;
      color: #fff;
      border-color: #9147ff;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn {
      background: #1f1f23;
      color: #efeff1;
      border: 1px solid #3d3d42;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .btn:hover { background: #2a2a2e; }
    .btn.danger { color: #f44336; border-color: #f44336; }
    .btn.danger:hover { background: rgba(244, 67, 54, 0.1); }

    .log-container {
      background: #0e0e10;
      border: 1px solid #2a2a2e;
      border-radius: 6px;
      height: calc(100vh - 140px);
      overflow-y: auto;
      padding: 8px;
    }

    .log-entry {
      padding: 4px 6px;
      border-bottom: 1px solid #1a1a1e;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .log-entry:last-child { border-bottom: none; }

    .log-entry.error { color: #f44336; }
    .log-entry.warn  { color: #ff9800; }
    .log-entry.debug { color: #888; }
    .log-entry.log   { color: #efeff1; }

    .log-ts { color: #666; margin-right: 8px; }
    .log-level { font-weight: bold; margin-right: 8px; min-width: 40px; display: inline-block; }
    .log-data { color: #adadb8; margin-left: 8px; font-size: 11px; }

    .empty { color: #666; padding: 24px; text-align: center; }
  </style>
</head>
<body>
  <h1>🛡️ Hype Control Logs</h1>

  <div class="tabs">
    <button class="tab-btn active" data-tab="extension">Extension Log</button>
    <button class="tab-btn" data-tab="settings">Settings Log</button>
  </div>

  <div class="controls">
    <button class="btn" id="btn-refresh">↻ Refresh</button>
    <button class="btn danger" id="btn-clear">Clear Log</button>
  </div>

  <div class="log-container" id="log-container">
    <p class="empty">Loading...</p>
  </div>

  <script src="logs.js"></script>
</body>
</html>
