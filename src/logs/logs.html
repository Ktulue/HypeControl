<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hype Control Logs</title>
  <link rel="stylesheet" href="logs.css">
</head>
<body>
  <div class="log-wrapper">
    <h1><img src="assets/icons/ChromeWebStore/HC_icon_48px.png" width="40" height="40" alt="Hype Control"> Hype Control Logs</h1>

    <div class="toolbar">
      <div class="tabs" role="tablist" aria-label="Log type">
        <button
          class="tab-btn active"
          role="tab"
          id="tab-extension"
          data-tab="extension"
          aria-selected="true"
          aria-controls="log-container"
        >Extension Log</button>
        <button
          class="tab-btn"
          role="tab"
          id="tab-settings"
          data-tab="settings"
          aria-selected="false"
          aria-controls="log-container"
        >Settings Log</button>
      </div>

      <div class="actions">
        <button class="btn" id="btn-refresh">↻ Refresh</button>
        <button class="btn danger" id="btn-clear">Clear Log</button>
      </div>
    </div>

    <div
      class="log-container"
      id="log-container"
      role="tabpanel"
      aria-labelledby="tab-extension"
      tabindex="0"
    >
      <p class="empty">Loading...</p>
    </div>
  </div>

  <script src="logs.js"></script>
</body>
</html>
